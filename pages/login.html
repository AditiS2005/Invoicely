<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — InvoiceLy</title>
    <meta
      name="description"
      content="Sign in to your InvoiceLy account to manage and create professional invoices."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="../assets/Logo.svg" />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../styles/auth.css" />
  </head>
  <body class="auth-body">
    <!-- clicking the logo takes you back to the landing page -->
    <a href="../index.html" class="auth-brand">
      <div class="auth-brand__logo-wrap">
        <img src="../assets/Logo.svg" alt="InvoiceLy" />
      </div>
      <span class="auth-brand__name">InvoiceLy</span>
    </a>

    <!-- main card — everything the user interacts with lives in here -->
    <div class="auth-card">
      <!-- header with badge + title -->
      <div class="auth-card__header">
        <div class="auth-card__badge">
          <svg width="8" height="8" viewBox="0 0 10 10" fill="none">
            <circle cx="5" cy="5" r="4" fill="#10b981" />
          </svg>
          Secure Login
        </div>
        <h1 class="auth-card__title">Welcome back</h1>
        <p class="auth-card__subtitle">
          Sign in to continue creating beautiful invoices
        </p>
      </div>

      <!-- feedback banner — JS toggles .visible and fills in the message -->
      <div class="auth-toast" id="loginToast" role="alert" aria-live="polite">
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          id="toastIcon"
        >
          <path
            d="M9 12l2 2 4-4M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span id="toastMsg"></span>
      </div>

      <!-- novalidate so we handle all feedback ourselves in auth.js -->
      <form class="auth-form" id="loginForm" novalidate>
        <!-- username -->
        <div class="auth-field-group">
          <label for="login-username">Username</label>
          <div class="auth-input-wrap">
            <span class="auth-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path
                  d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <circle
                  cx="12"
                  cy="7"
                  r="4"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            <input
              type="text"
              id="login-username"
              name="username"
              placeholder="Enter your username"
              autocomplete="username"
              required
            />
          </div>
          <span class="auth-field-hint" id="username-hint"
            >Username is required</span
          >
        </div>

        <!-- password + eye toggle -->
        <div class="auth-field-group">
          <label for="login-password">Password</label>
          <div class="auth-input-wrap">
            <span class="auth-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <rect
                  x="3"
                  y="11"
                  width="18"
                  height="11"
                  rx="2"
                  ry="2"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M7 11V7a5 5 0 0110 0v4"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            <input
              type="password"
              id="login-password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              class="has-toggle"
              required
            />
            <button
              type="button"
              class="auth-eye-btn"
              id="loginEyeBtn"
              aria-label="Toggle password visibility"
            >
              <!-- Eye icon (password hidden) -->
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                class="icon-eye"
              >
                <path
                  d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <circle
                  cx="12"
                  cy="12"
                  r="3"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <!-- Eye-off icon (password visible) -->
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                class="icon-eye-off"
                style="display: none"
              >
                <path
                  d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
          <span class="auth-field-hint" id="password-hint"
            >Password is required</span
          >
        </div>

        <!-- remember me & forgot password sit on the same row -->
        <div class="auth-extras">
          <label class="auth-checkbox-label">
            <input type="checkbox" id="rememberMe" name="rememberMe" />
            Remember me
          </label>
          <a href="#" class="auth-link">Forgot password?</a>
        </div>

        <!-- submit — JS disables this while waiting for the response -->
        <button type="submit" class="btn-auth-submit" id="loginSubmitBtn">
          Sign In
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path
              d="M5 12H19M19 12L12 5M19 12L12 19"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </form>

      <!-- link to register for people who ended up here by mistake -->
      <p class="auth-switch">
        Don't have an account?
        <a href="register.html">Create one free</a>
      </p>
    </div>
    <!-- /.auth-card -->

    <!-- Footer Note -->
    <p class="auth-footer-note">
      By signing in you agree to InvoiceLy's
      <a href="#">Terms of Service</a> &amp; <a href="#">Privacy Policy</a>.
    </p>

    <script src="../scripts/auth.js"></script>
  </body>
</html>
